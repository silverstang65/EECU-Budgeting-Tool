<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/dashboard.css">
    <title>EECU Dashboard Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <figure><img src="../Image/logo.png"></figure>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="Budgeting.html">Budgeting</a>
            <a href="index.html"> Account</a>
        </nav>
        <div id="Profile">
            <img src="../Image/healthicons_ui-user-profile.svg" alt="Profile-Image">
            <p>Profile</p>
            <img src="Image/profile-arrow.svg" alt="Dropdown-Icon">
        </div>
    </header>
    <h1 id="header-main">Dashboard</h1>
    <main>
        <div class="cards">
            <section class="card" id="card-1">
                <h1>$1,000.00</h1>
            </section>
            <section class="card">
                <h2>Summer Gap Savings</h2>
                <!-- Add the saving line bar using js-->
            </section>
            <section class="card">
                <h2>In-hand Salary</h2>
            </section>
            <section class="card">
                <h2>Recent Transactions</h2>
            </section>
        </div>
    </main>
    <footer>
        <figure>
            <img src="../Image/EECU Logo White.svg" alt="EECU-White">
        </figure>
        <section class="links">
            <ul>
                <li>
                    <a href="dashboard.html">Dashboard</a>
                </li>
                <li>
                    <a href="Budgeting.html">Budgeting</a>
                </li>
                <li>
                    <a href="#">Account</a>
                </li>
            </ul>
        </section>
    </footer>

</body>

</html>
